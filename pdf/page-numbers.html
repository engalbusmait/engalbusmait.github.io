<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Add Page Numbers — PDF Toolkit</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
  <script src="/pdf/pdf-utils.js" defer></script>
  <style>
    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
    :root { --bg:#070b14; --surface:rgba(255,255,255,0.04); --surface2:#0d1526; --border:rgba(255,255,255,0.08); --border-c:rgba(0,212,255,0.25); --cyan:#00d4ff; --green:#00ff88; --purple:#8b5cf6; --text:#e2e8f0; --muted:#8892a4; }
    body { font-family:'Inter',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }
    body::before { content:''; position:fixed; inset:0; pointer-events:none; z-index:0; background: radial-gradient(ellipse 70% 50% at 15% 30%,rgba(0,212,255,.05) 0%,transparent 65%), radial-gradient(ellipse 60% 50% at 85% 75%,rgba(139,92,246,.05) 0%,transparent 65%); }
    nav { position:sticky; top:0; z-index:100; display:flex; align-items:center; justify-content:space-between; padding:0 clamp(1.5rem,5vw,4rem); height:64px; background:rgba(7,11,20,.85); backdrop-filter:blur(24px); border-bottom:1px solid var(--border); }
    .nav-back { text-decoration:none; color:var(--muted); font-size:.85rem; font-weight:500; transition:color .2s; }
    .nav-back:hover { color:var(--cyan); }
    .nav-logo { font-family:'JetBrains Mono',monospace; font-size:1rem; font-weight:700; color:var(--cyan); text-decoration:none; }
    .nav-logo em { color:var(--green); font-style:normal; }
    .container { max-width:820px; margin:0 auto; padding:2rem clamp(1.5rem,5vw,3rem) 4rem; position:relative; z-index:1; }
    .tool-header { text-align:center; margin-bottom:2.5rem; }
    .tool-icon { font-size:2.8rem; margin-bottom:.75rem; }
    .tool-header h1 { font-size:2rem; font-weight:800; letter-spacing:-1px; margin-bottom:.5rem; }
    .tool-header p { color:var(--muted); font-size:.95rem; }
    .dropzone { border:2px dashed var(--border-c); border-radius:16px; padding:3rem 2rem; text-align:center; cursor:pointer; transition:border-color .2s, background .2s; background:rgba(0,212,255,.02); }
    .dropzone:hover, .dropzone.over { border-color:var(--cyan); background:rgba(0,212,255,.05); }
    .dropzone p { color:var(--muted); font-size:.9rem; margin-top:.5rem; }
    .dropzone .dz-icon { font-size:2.5rem; margin-bottom:.75rem; }
    .dz-btn { display:inline-block; margin-top:1rem; padding:.5rem 1.4rem; background:rgba(0,212,255,.1); border:1px solid rgba(0,212,255,.3); border-radius:8px; color:var(--cyan); font-size:.85rem; font-weight:600; cursor:pointer; transition:background .2s; }
    .dz-btn:hover { background:rgba(0,212,255,.18); }
    #fileInput { display:none; }
    .file-info { display:flex; align-items:center; gap:.75rem; background:var(--surface2); border:1px solid var(--border); border-radius:12px; padding:.9rem 1.1rem; margin-top:1rem; }
    .fi-icon { font-size:1.4rem; }
    .fi-details { flex:1; min-width:0; }
    .fi-name { font-size:.9rem; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .fi-meta { font-size:.78rem; color:var(--muted); margin-top:.15rem; }
    .fi-clear { background:none; border:none; color:var(--muted); cursor:pointer; font-size:1rem; padding:.2rem .4rem; border-radius:6px; transition:color .2s; }
    .fi-clear:hover { color:#ff4757; }
    .options-panel { background:var(--surface2); border:1px solid var(--border); border-radius:16px; padding:1.5rem; margin-top:1.5rem; }
    .options-panel h3 { font-size:.85rem; font-weight:600; color:var(--muted); text-transform:uppercase; letter-spacing:.08em; margin-bottom:1.1rem; }
    .opt-grid { display:grid; grid-template-columns:1fr 1fr; gap:1rem; }
    @media(max-width:600px) { .opt-grid { grid-template-columns:1fr; } }
    .opt-field { display:flex; flex-direction:column; gap:.35rem; }
    .opt-field label { font-size:.82rem; color:var(--muted); font-weight:500; }
    input[type="number"], select, input[type="text"] { background:var(--bg); border:1px solid var(--border); border-radius:8px; color:var(--text); font-family:inherit; font-size:.88rem; padding:.45rem .8rem; outline:none; transition:border-color .2s; width:100%; }
    input:focus, select:focus { border-color:var(--cyan); }
    /* Position picker */
    .pos-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:.4rem; }
    .pos-btn { padding:.4rem; border:1px solid var(--border); border-radius:6px; background:var(--surface); color:var(--muted); font-size:.72rem; font-weight:500; cursor:pointer; text-align:center; transition:all .15s; font-family:inherit; }
    .pos-btn:hover { border-color:var(--cyan); color:var(--cyan); }
    .pos-btn.active { border-color:var(--cyan); color:var(--cyan); background:rgba(0,212,255,.08); }
    .pos-btn[disabled] { opacity:.3; cursor:default; }
    .format-hint { font-size:.75rem; color:var(--muted); margin-top:.4rem; font-family:'JetBrains Mono',monospace; }
    .btn-primary { display:inline-flex; align-items:center; gap:.5rem; padding:.7rem 1.8rem; border-radius:10px; border:none; cursor:pointer; background:linear-gradient(135deg,var(--cyan),var(--purple)); color:#fff; font-size:.95rem; font-weight:700; font-family:inherit; transition:opacity .2s, transform .15s; margin-top:1.5rem; width:100%; justify-content:center; }
    .btn-primary:hover { opacity:.88; transform:translateY(-1px); }
    .btn-primary:disabled { opacity:.4; cursor:not-allowed; transform:none; }
    .btn-download { display:none; align-items:center; justify-content:center; gap:.5rem; padding:.7rem 1.8rem; border-radius:10px; border:1px solid var(--green); background:rgba(0,255,136,.08); color:var(--green); font-size:.95rem; font-weight:700; font-family:inherit; cursor:pointer; transition:background .2s; margin-top:.75rem; width:100%; }
    .btn-download:hover { background:rgba(0,255,136,.15); }
    .btn-download.visible { display:inline-flex; }
    .privacy-note { text-align:center; font-size:.78rem; color:var(--muted); margin-top:1.5rem; padding-top:1.5rem; border-top:1px solid var(--border); }
    .privacy-note strong { color:var(--green); }

    .nav-author {
      position: absolute; left: 50%; transform: translateX(-50%);
      font-size: .78rem; font-weight: 600; color: var(--muted);
      text-decoration: none; white-space: nowrap;
      letter-spacing: .02em; transition: color .2s;
    }
    .nav-author:hover { color: var(--cyan); }
    .nav-author span { color: var(--cyan); }
  </style>
</head>
<body>
<nav>
  <a href="/pdf/" class="nav-back">← PDF Tools</a>
  <a href="/" class="nav-author" rel="noopener">by <span>Waleed Albusmait</span></a>
  <a href="/pdf/" class="nav-logo">pdf<em>.tools</em></a>
</nav>
<div class="container">
  <div class="tool-header">
    <div class="tool-icon">🔢</div>
    <h1>Add Page Numbers</h1>
    <p>Insert page numbers into every page of your PDF.</p>
  </div>

  <div class="dropzone" id="dropzone">
    <div class="dz-icon">📄</div>
    <strong>Drag &amp; drop a PDF file here</strong>
    <p>or click to browse</p>
    <label for="fileInput" class="dz-btn">Choose File</label>
  </div>
  <input type="file" id="fileInput" accept=".pdf,application/pdf" />
  <div id="fileInfoBox" style="display:none"></div>

  <div class="options-panel" id="optionsPanel" style="display:none">
    <h3>Page Number Options</h3>
    <div class="opt-grid">
      <div class="opt-field">
        <label>Position</label>
        <div class="pos-grid" id="posGrid">
          <button class="pos-btn" data-pos="top-left">Top Left</button>
          <button class="pos-btn" data-pos="top-center">Top Center</button>
          <button class="pos-btn" data-pos="top-right">Top Right</button>
          <button class="pos-btn" data-pos="bottom-left">Bottom Left</button>
          <button class="pos-btn active" data-pos="bottom-center">Bottom Center</button>
          <button class="pos-btn" data-pos="bottom-right">Bottom Right</button>
        </div>
      </div>
      <div class="opt-field" style="display:flex;flex-direction:column;gap:.75rem">
        <div>
          <label for="startNum">Start number</label>
          <input type="number" id="startNum" value="1" min="0" />
        </div>
        <div>
          <label for="fontSize">Font size (pt)</label>
          <input type="number" id="fontSize" value="12" min="6" max="72" />
        </div>
        <div>
          <label for="margin">Margin from edge (pt)</label>
          <input type="number" id="margin" value="20" min="5" max="100" />
        </div>
      </div>
      <div class="opt-field" style="grid-column:1/-1">
        <label for="format">Format <span class="format-hint">({n} = page num, {total} = total pages)</span></label>
        <input type="text" id="format" value="{n}" placeholder="{n} of {total}" />
      </div>
    </div>
  </div>

  <button class="btn-primary" id="processBtn" disabled>🔢 Add Page Numbers</button>
  <button class="btn-download" id="downloadBtn">⬇ Download PDF</button>

  <div class="privacy-note"><strong>🔒 Private by design:</strong> All processing happens in your browser. Files are never uploaded to any server.</div>
</div>

<script>
document.addEventListener('DOMContentLoaded', () => {
  const dropzone = document.getElementById('dropzone');
  const fileInput = document.getElementById('fileInput');
  const fileInfoBox = document.getElementById('fileInfoBox');
  const optPanel = document.getElementById('optionsPanel');
  const processBtn = document.getElementById('processBtn');
  const downloadBtn = document.getElementById('downloadBtn');

  let currentFile = null, position = 'bottom-center';

  document.querySelectorAll('.pos-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.pos-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      position = btn.dataset.pos;
    });
  });

  dropzone.addEventListener('click', (e) => { if (e.target.tagName === 'LABEL') return; fileInput.click(); });
  dropzone.addEventListener('dragover', e => { e.preventDefault(); dropzone.classList.add('over'); });
  dropzone.addEventListener('dragleave', () => dropzone.classList.remove('over'));
  dropzone.addEventListener('drop', e => { e.preventDefault(); dropzone.classList.remove('over'); if (e.dataTransfer.files[0]) setFile(e.dataTransfer.files[0]); });
  fileInput.addEventListener('change', () => { if (fileInput.files[0]) { setFile(fileInput.files[0]); fileInput.value=''; } });

  async function setFile(f) {
    const err = PdfUtils.validatePdf(f);
    if (err) { PdfUtils.showError(err); return; }
    currentFile = f;
    let pages = '?';
    try { const ab = await PdfUtils.readFileAsArrayBuffer(f); pages = await PdfUtils.getPdfPageCount(ab); } catch {}
    fileInfoBox.style.display = 'flex'; fileInfoBox.className = 'file-info';
    fileInfoBox.innerHTML = `<span class="fi-icon">📄</span><div class="fi-details"><div class="fi-name">${escHtml(f.name)}</div><div class="fi-meta">${PdfUtils.formatSize(f.size)} · ${pages} pages</div></div><button class="fi-clear" id="clearFile">✕</button>`;
    document.getElementById('clearFile').onclick = reset;
    optPanel.style.display = 'block';
    processBtn.disabled = false;
    downloadBtn.classList.remove('visible');
  }

  processBtn.addEventListener('click', async () => {
    PdfUtils.clearError();
    PdfUtils.showProgress('Adding page numbers…');
    processBtn.disabled = true;
    downloadBtn.classList.remove('visible');
    try {
      const ab = await PdfUtils.readFileAsArrayBuffer(currentFile);
      const pdf = await PDFLib.PDFDocument.load(ab, { ignoreEncryption: true });
      const font = await pdf.embedFont(PDFLib.StandardFonts.Helvetica);
      const startNum = parseInt(document.getElementById('startNum').value, 10) || 1;
      const fontSize = parseInt(document.getElementById('fontSize').value, 10) || 12;
      const margin = parseInt(document.getElementById('margin').value, 10) || 20;
      const fmt = document.getElementById('format').value || '{n}';
      const total = pdf.getPageCount();

      pdf.getPages().forEach((page, i) => {
        const { width, height } = page.getSize();
        const text = fmt.replace('{n}', startNum + i).replace('{total}', total);
        const textWidth = font.widthOfTextAtSize(text, fontSize);

        let x, y;
        if (position.includes('left')) x = margin;
        else if (position.includes('right')) x = width - textWidth - margin;
        else x = (width - textWidth) / 2;

        if (position.includes('top')) y = height - margin - fontSize;
        else y = margin;

        page.drawText(text, { x, y, size: fontSize, font, color: PDFLib.rgb(0, 0, 0), opacity: 0.7 });
      });

      const bytes = await pdf.save();
      PdfUtils.trackOperation('page_numbers');
      PdfUtils.hideProgress();
      downloadBtn.classList.add('visible');
      downloadBtn.onclick = () => PdfUtils.downloadFile(bytes, 'numbered.pdf');
    } catch (err) {
      PdfUtils.hideProgress();
      PdfUtils.showError('Failed: ' + err.message);
    } finally { processBtn.disabled = false; }
  });

  function reset() {
    currentFile = null;
    fileInfoBox.style.display = 'none'; optPanel.style.display = 'none';
    processBtn.disabled = true; downloadBtn.classList.remove('visible');
  }
  function escHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
});
</script>
</body>
</html>
