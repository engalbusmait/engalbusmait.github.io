<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Merge PDF — PDF Toolkit</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
  <script src="/pdf/pdf-utils.js" defer></script>
  <style>
    /* ── BASE ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:#070b14; --surface:rgba(255,255,255,0.04); --surface2:#0d1526;
      --border:rgba(255,255,255,0.08); --border-c:rgba(0,212,255,0.25);
      --cyan:#00d4ff; --green:#00ff88; --purple:#8b5cf6;
      --text:#e2e8f0; --muted:#8892a4;
    }
    body { font-family:'Inter',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }
    body::before {
      content:''; position:fixed; inset:0; pointer-events:none; z-index:0;
      background:
        radial-gradient(ellipse 70% 50% at 15% 30%,rgba(0,212,255,.05) 0%,transparent 65%),
        radial-gradient(ellipse 60% 50% at 85% 75%,rgba(139,92,246,.05) 0%,transparent 65%);
    }
    ::selection { background:rgba(0,212,255,.2); }
    nav {
      position:sticky; top:0; z-index:100;
      display:flex; align-items:center; justify-content:space-between;
      padding:0 clamp(1.5rem,5vw,4rem); height:64px;
      background:rgba(7,11,20,.85); backdrop-filter:blur(24px);
      border-bottom:1px solid var(--border);
    }
    .nav-back { text-decoration:none; color:var(--muted); font-size:.85rem; font-weight:500; transition:color .2s; }
    .nav-back:hover { color:var(--cyan); }
    .nav-logo { font-family:'JetBrains Mono',monospace; font-size:1rem; font-weight:700; color:var(--cyan); text-decoration:none; }
    .nav-logo em { color:var(--green); font-style:normal; }
    .container { max-width:820px; margin:0 auto; padding:2rem clamp(1.5rem,5vw,3rem) 4rem; position:relative; z-index:1; }

    /* ── HEADER ── */
    .tool-header { text-align:center; margin-bottom:2.5rem; }
    .tool-icon { font-size:2.8rem; margin-bottom:.75rem; }
    .tool-header h1 { font-size:2rem; font-weight:800; letter-spacing:-1px; margin-bottom:.5rem; }
    .tool-header p { color:var(--muted); font-size:.95rem; }

    /* ── DROP ZONE ── */
    .dropzone {
      border:2px dashed var(--border-c); border-radius:16px;
      padding:3rem 2rem; text-align:center; cursor:pointer;
      transition:border-color .2s, background .2s;
      background:rgba(0,212,255,.02);
    }
    .dropzone:hover, .dropzone.over { border-color:var(--cyan); background:rgba(0,212,255,.05); }
    .dropzone p { color:var(--muted); font-size:.9rem; margin-top:.5rem; }
    .dropzone .dz-icon { font-size:2.5rem; margin-bottom:.75rem; }
    .dz-btn {
      display:inline-block; margin-top:1rem; padding:.5rem 1.4rem;
      background:rgba(0,212,255,.1); border:1px solid rgba(0,212,255,.3);
      border-radius:8px; color:var(--cyan); font-size:.85rem; font-weight:600;
      cursor:pointer; transition:background .2s;
    }
    .dz-btn:hover { background:rgba(0,212,255,.18); }
    #fileInput { display:none; }

    /* ── FILE LIST ── */
    .file-list { margin-top:1.5rem; display:flex; flex-direction:column; gap:.6rem; }
    .file-item {
      display:flex; align-items:center; gap:.75rem;
      background:var(--surface2); border:1px solid var(--border);
      border-radius:12px; padding:.75rem 1rem;
      cursor:grab; transition:border-color .2s, box-shadow .2s;
      user-select:none;
    }
    .file-item:active { cursor:grabbing; }
    .file-item.sortable-ghost { opacity:.4; }
    .file-item.sortable-chosen { box-shadow:0 0 0 2px var(--cyan); border-color:var(--cyan); }
    .fi-drag { color:var(--muted); font-size:1.1rem; flex-shrink:0; }
    .fi-icon { font-size:1.3rem; flex-shrink:0; }
    .fi-info { flex:1; min-width:0; }
    .fi-name { font-size:.88rem; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .fi-meta { font-size:.75rem; color:var(--muted); margin-top:.1rem; }
    .fi-remove {
      background:none; border:none; color:var(--muted); cursor:pointer;
      font-size:1.1rem; padding:.2rem .4rem; border-radius:6px;
      transition:color .2s, background .2s; flex-shrink:0;
    }
    .fi-remove:hover { color:#ff4757; background:rgba(255,71,87,.1); }

    /* ── OPTIONS ── */
    .options-panel {
      background:var(--surface2); border:1px solid var(--border);
      border-radius:16px; padding:1.5rem; margin-top:1.5rem;
    }
    .options-panel h3 { font-size:.85rem; font-weight:600; color:var(--muted); text-transform:uppercase; letter-spacing:.08em; margin-bottom:1rem; }
    .opt-row { display:flex; align-items:center; gap:1rem; flex-wrap:wrap; }
    label { font-size:.88rem; color:var(--text); font-weight:500; white-space:nowrap; }
    input[type="text"], input[type="password"], input[type="number"], select, textarea {
      background:var(--bg); border:1px solid var(--border);
      border-radius:8px; color:var(--text); font-family:inherit;
      font-size:.88rem; padding:.45rem .8rem; outline:none;
      transition:border-color .2s;
    }
    input[type="text"]:focus, input[type="password"]:focus,
    input[type="number"]:focus, select:focus, textarea:focus {
      border-color:var(--cyan);
    }
    input[type="text"] { flex:1; min-width:180px; }

    /* ── BUTTONS ── */
    .btn-primary {
      display:inline-flex; align-items:center; gap:.5rem;
      padding:.7rem 1.8rem; border-radius:10px; border:none; cursor:pointer;
      background:linear-gradient(135deg,var(--cyan),var(--purple));
      color:#fff; font-size:.95rem; font-weight:700; font-family:inherit;
      transition:opacity .2s, transform .15s;
      margin-top:1.5rem; width:100%;
      justify-content:center;
    }
    .btn-primary:hover { opacity:.88; transform:translateY(-1px); }
    .btn-primary:disabled { opacity:.4; cursor:not-allowed; transform:none; }
    .btn-download {
      display:none; align-items:center; justify-content:center; gap:.5rem;
      padding:.7rem 1.8rem; border-radius:10px; border:1px solid var(--green);
      background:rgba(0,255,136,.08); color:var(--green);
      font-size:.95rem; font-weight:700; font-family:inherit;
      cursor:pointer; transition:background .2s, transform .15s;
      margin-top:.75rem; width:100%;
    }
    .btn-download:hover { background:rgba(0,255,136,.15); transform:translateY(-1px); }
    .btn-download.visible { display:inline-flex; }

    /* ── PRIVACY NOTE ── */
    .privacy-note {
      text-align:center; font-size:.78rem; color:var(--muted);
      margin-top:1.5rem; padding-top:1.5rem; border-top:1px solid var(--border);
    }
    .privacy-note strong { color:var(--green); }

    .nav-author {
      position: absolute; left: 50%; transform: translateX(-50%);
      font-size: .78rem; font-weight: 600; color: var(--muted);
      text-decoration: none; white-space: nowrap;
      letter-spacing: .02em; transition: color .2s;
    }
    .nav-author:hover { color: var(--cyan); }
    .nav-author span { color: var(--cyan); }
  </style>
</head>
<body>

<nav>
  <a href="/pdf/" class="nav-back">← PDF Tools</a>
  <a href="/" class="nav-author" rel="noopener">by <span>Waleed Albusmait</span></a>
  <a href="/pdf/" class="nav-logo">pdf<em>.tools</em></a>
</nav>

<div class="container">
  <div class="tool-header">
    <div class="tool-icon">🔀</div>
    <h1>Merge PDF</h1>
    <p>Combine multiple PDF files into one. Drag to reorder before merging.</p>
  </div>

  <!-- Drop zone -->
  <div class="dropzone" id="dropzone">
    <div class="dz-icon">📄</div>
    <strong>Drag &amp; drop PDF files here</strong>
    <p>or click to browse</p>
    <label for="fileInput" class="dz-btn">Choose Files</label>
  </div>
  <input type="file" id="fileInput" accept=".pdf,application/pdf" multiple />

  <!-- File list (sortable) -->
  <div class="file-list" id="fileList"></div>

  <!-- Options -->
  <div class="options-panel" id="optionsPanel" style="display:none">
    <h3>Options</h3>
    <div class="opt-row">
      <label for="outputName">Output filename:</label>
      <input type="text" id="outputName" value="merged.pdf" />
    </div>
  </div>

  <button class="btn-primary" id="processBtn" disabled>🔀 Merge PDFs</button>
  <button class="btn-download" id="downloadBtn">⬇ Download Merged PDF</button>

  <div class="privacy-note"><strong>🔒 Private by design:</strong> All processing happens in your browser. Files are never uploaded to any server.</div>
</div>

<script>
document.addEventListener('DOMContentLoaded', () => {
  const dropzone   = document.getElementById('dropzone');
  const fileInput  = document.getElementById('fileInput');
  const fileList   = document.getElementById('fileList');
  const optPanel   = document.getElementById('optionsPanel');
  const processBtn = document.getElementById('processBtn');
  const downloadBtn = document.getElementById('downloadBtn');
  const outputName = document.getElementById('outputName');

  let files = []; // { file, name, size, pages }
  let resultBytes = null;

  // Sortable
  new Sortable(fileList, {
    animation: 150,
    ghostClass: 'sortable-ghost',
    chosenClass: 'sortable-chosen',
    onEnd() { syncOrder(); }
  });

  function syncOrder() {
    const items = fileList.querySelectorAll('.file-item');
    const reordered = [];
    items.forEach(item => {
      const idx = parseInt(item.dataset.idx, 10);
      reordered.push(files[idx]);
    });
    files = reordered;
    renderList();
  }

  // Drop zone
  dropzone.addEventListener('click', (e) => { if (e.target.tagName === 'LABEL') return; fileInput.click(); });
  dropzone.addEventListener('dragover', e => { e.preventDefault(); dropzone.classList.add('over'); });
  dropzone.addEventListener('dragleave', () => dropzone.classList.remove('over'));
  dropzone.addEventListener('drop', e => {
    e.preventDefault(); dropzone.classList.remove('over');
    addFiles([...e.dataTransfer.files]);
  });
  fileInput.addEventListener('change', () => { addFiles([...fileInput.files]); fileInput.value = ''; });

  async function addFiles(newFiles) {
    for (const f of newFiles) {
      const err = PdfUtils.validatePdf(f);
      if (err) { PdfUtils.showError(err); continue; }
      if (f.size > 200 * 1024 * 1024) { PdfUtils.showError('File too large (max 200 MB): ' + f.name); continue; }
      let pages = '?';
      try {
        const ab = await PdfUtils.readFileAsArrayBuffer(f);
        pages = await PdfUtils.getPdfPageCount(ab);
      } catch {}
      files.push({ file: f, name: f.name, size: f.size, pages });
    }
    renderList();
    resultBytes = null;
    downloadBtn.classList.remove('visible');
  }

  function renderList() {
    fileList.innerHTML = '';
    if (files.length === 0) {
      optPanel.style.display = 'none';
      processBtn.disabled = true;
      return;
    }
    optPanel.style.display = 'block';
    processBtn.disabled = false;
    files.forEach((f, i) => {
      const div = document.createElement('div');
      div.className = 'file-item';
      div.dataset.idx = i;
      div.innerHTML = `
        <span class="fi-drag">⠿</span>
        <span class="fi-icon">📄</span>
        <div class="fi-info">
          <div class="fi-name">${escHtml(f.name)}</div>
          <div class="fi-meta">${PdfUtils.formatSize(f.size)} · ${f.pages} page${f.pages !== 1 ? 's' : ''}</div>
        </div>
        <button class="fi-remove" data-i="${i}" title="Remove">✕</button>`;
      div.querySelector('.fi-remove').addEventListener('click', e => {
        files.splice(parseInt(e.currentTarget.dataset.i, 10), 1);
        renderList();
        resultBytes = null;
        downloadBtn.classList.remove('visible');
      });
      fileList.appendChild(div);
    });
    // Re-bind sortable indices after re-render
    new Sortable(fileList, { animation: 150, ghostClass: 'sortable-ghost', chosenClass: 'sortable-chosen' });
  }

  processBtn.addEventListener('click', async () => {
    if (files.length < 2) { PdfUtils.showError('Please add at least 2 PDF files.'); return; }
    PdfUtils.clearError();
    PdfUtils.showProgress('Merging PDFs…');
    processBtn.disabled = true;
    downloadBtn.classList.remove('visible');
    try {
      const merged = await PDFLib.PDFDocument.create();
      for (const entry of files) {
        const ab = await PdfUtils.readFileAsArrayBuffer(entry.file);
        const src = await PDFLib.PDFDocument.load(ab, { ignoreEncryption: true });
        const copied = await merged.copyPages(src, src.getPageIndices());
        copied.forEach(p => merged.addPage(p));
      }
      resultBytes = await merged.save();
      PdfUtils.trackOperation('merge');
      PdfUtils.hideProgress();
      downloadBtn.classList.add('visible');
      downloadBtn.onclick = () => PdfUtils.downloadFile(resultBytes, outputName.value || 'merged.pdf');
    } catch (err) {
      PdfUtils.hideProgress();
      PdfUtils.showError('Merge failed: ' + err.message);
    } finally {
      processBtn.disabled = false;
    }
  });

  function escHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
});
</script>
</body>
</html>
